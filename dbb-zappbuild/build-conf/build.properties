ue contains a comma separated list of patterns.# example: A filter of *.SUB1, *.SUB2 will exclude modules SUB1 and SUB2#          from any dataset. To exclude member HELLO in PDS TEST.ASM will#          be matched by the pattern TEST.ASM.HELLO. The pattern TEST.ASM.*#          will match any member in the data set TEST.COBOL.# The following filter excludes CICS and LE Library references.# NJL - Mod exclude vscode generated logs/** folder from scanner to avoid BGZTK0046E#     - But you should use .gitignore with   **/logs to avoid pushing the vscode logsdbb.LinkEditScanner.excludeFilter = $äSDFHLOADü.*, $äSCEELKEDü.*, **/logs/**## Determine the behavior when facing a scanner failure# 'true' proceeds with the build and report the a warning (default)# 'false' will terminate the build processcontinueOnScanFailure=true## Determine if a subfolder with a timestamp should be created in the buildOutDir location.# Applies to all build types except userBuild# Default: true#createBuildOutputSubfolder=truecreateBuildOutputSubfolder=false## default DBB Repository Web Application authentication properties# can be overridden by build.groovy script options# build.groovy option -url, --url ß/wlp/bin$ . server start dbb#dbb.RepositoryClient.url=https://172.26.1.1:9443/dbb/#dbb.RepositoryClient.url=https://192.168.86.128:9443/dbb/# build.groovy option -id, --iddbb.RepositoryClient.userId=ADMIN# build.groovy option -pw, --pwdbb.RepositoryClient.password=ADMIN# build.groovy option -pf, --pf#dbb.RepositoryClient.passwordFile=$äzAppBuildDirü/utilities/ADMIN.pwdbb.RepositoryClient.sslProtocols=TLS,TLSv1.2# The dbb.gateway.type property determines which gateway type is used for the entire build process# Possible values are 'legacy' and 'interactive.  Default if not indicated is 'legacy'dbb.gateway.type=legacy# Procedure Name - specified with the procname parameterdbb.gateway.procedureName=# Account number - specified with the acctnum paramete